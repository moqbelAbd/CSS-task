<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Onboarding</title>
    <link rel="stylesheet" href="styles/Responsive Onboarding.css">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    
        <div class="page first-page">
            <br><br><br>
<div class="container first-container">
<h1>Sign Up</h1> 
<p>Please fill this form to create an account</p> <hr><br>
<form >

<div class="first-form-group">
        <span class="full-name">
      <input type="text" class="first-form-input" placeholder="First Name">
      <input type="text" class="first-form-input" placeholder="Last Name">
    </span>

    <input type="email" class="first-form-input" required placeholder="Email">
    <input type="password" class="first-form-input" required placeholder="Password">
    <input type="password" class="first-form-input" required placeholder="Confirm Password">
        </div><br>
       <span class="first-show"> <input type="checkbox" value="show" name="show">I Accept <a>terms of use</a> & <a>Privacy Policy</a>
    </span> <br>
    <br>
    <div class="first-form-footer">
    <button type="submit" class="first-form-submit-button">Sign Up</button>
    <br>   <br>   

    </div>
</form>

</div>
<br>
    <div class="footer-inline">
    Already have an account? <button class="first-form-inline-button">Login In</button>
    </div>
    <br>
    </div>
<br>
<hr>
<br>
<br>

<div class="second-page">
<header class="page-header" >
    <p class="brand">Dollar Clup</p>
    <nav class="page-nav">
        <a>
          <i class="fa-solid fa-cart-arrow-down"></i>
        Shop /a>
            <a>Home</a>
        <a>Transactions</a>
        <a>Profile</a>
    </nav>
</header>

<section class="middle-section">
    <div class="title">
        <h1>Contact Us</h1>
        <p>Send us your question in a message</p>
    </div>

    <div class="input-label-group">
        <label>Write your question here</label>
        <input type="text" class="message" maxlength="120">
    </div>


    <p class="respond">We respond in 2 days maximum</p>
</section>

    <footer class="page-footer">
        <p>Questions not answerd?</p>
        <p><small>Call Us</small></p>
    </footer>

</div>


</body>
</html>
