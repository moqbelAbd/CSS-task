<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task3</title>
        <link rel="stylesheet" href="styles/task3.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
S</head>
<body>
    
    

    <div class="page first-page">
<div class="container first-container">
<h1>Sign Up</h1> <br>
<form >

<div class="first-form-group">
        <span class="full-name">
      <input type="text" class="first-form-input" placeholder="First Name">
      <input type="text" class="first-form-input" placeholder="Last Name">
    </span>

    <input type="email" class="first-form-input" required placeholder="Email">
    <input type="password" class="first-form-input" required placeholder="Password">
        </div><br>
       <span class="first-show"> <input type="checkbox" value="show" name="show">I Accept terms of use & Privacy Policy
    </span> <br>
    <br>
    <div class="first-form-footer">
    <button type="submit" class="first-form-submit-button">Sign In</button>
    <br>   

    </div>
</form>
    <div class="footer-inline">
    Already have an account? <button class="first-form-inline-button">Sign In</button>
        <p class="copyright">Copyright @Company.com</p>
       
</div>
</div>
    </div>
<br>
<hr>
<br>


   <div class="page second-page">
    <div class="page-container">
        <img src="resoursces/laptop.png" alt="laptop" height="200px" width="200px">
<div class="container second-container">
<h1>Member Login</h1> <br>
<form >

<div class="first-form-group">
 
    <span class="input-wrapper">
     <i class="fas fa-envelope-open" style="font-size:12px; color:rgb(80, 80, 80);"></i>
        <input type="email" class="second-form-input" required placeholder="Email">
    </span>
    <span class="input-wrapper">
     <i class="fas fa-lock" style="font-size:12px ; color:rgb(80, 80, 80);"></i>
            <input type="password" class="second-form-input" required placeholder="Password">
    </span>
    <br>
    <br>
    <div class="first-form-footer">
    <button type="submit" class="first-form-submit-button">LOGIN</button>
    <br>   

    </div>
</form>
    <div class="second-footer-inline">
    <p>Forgot <a class="first-form-inline-button">Username / password?</a> </p>
    <br>    <br>
    <span class="create-account">
        <a class="create-a">Create your account
        <i class="fas fa-arrow-alt-circle-right" style="font-size:16px;"></i>
    </a>
    </span>
       
</div>
</div>
</div>
    </div>
